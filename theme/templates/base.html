<!DOCTYPE html>
<html lang="es">
<head>
    <title>{% block title %}TuPeli{% endblock %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-zinc-950 min-h-screen font-sans text-white">

    <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="{% url 'lista_peliculas' %}" class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
                </svg>
                <span class="text-2xl font-extrabold tracking-tight">
                    Tu<span class="text-purple-500">Peli</span>
                </span>
            </a>
            <a href="{% url 'crear_pelicula' %}"
               class="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white font-semibold px-4 py-2 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                </svg>
                Agregar película
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
                    {% if message.tags == 'success' %}bg-green-900 text-green-300 border border-green-700
                    {% elif message.tags == 'error' %}bg-red-900 text-red-300 border border-red-700
                    {% else %}bg-zinc-800 text-zinc-300 border border-zinc-700{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

</body>
</html>
